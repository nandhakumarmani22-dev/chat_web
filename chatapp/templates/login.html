{% extends 'base.html' %}
{% block title %}Login — ChatApp{% endblock %}
{% block extra_css %}
<style>
  * {
    -webkit-text-size-adjust: 100%
  }

  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: #f0f2f5
  }

  .auth-box {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08)
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 24px
  }

  .auth-logo .logo-circle {
    width: 56px;
    height: 56px;
    background: #25D366;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .auth-logo .logo-circle i {
    font-size: 26px;
    color: #fff
  }

  .auth-logo h1 {
    font-size: 20px;
    font-weight: 700;
    color: #111;
    margin-bottom: 2px
  }

  .auth-logo p {
    font-size: 13px;
    color: #667781
  }

  .form-group {
    margin-bottom: 14px
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #667781;
    margin-bottom: 5px;
    letter-spacing: .4px;
    text-transform: uppercase
  }

  .form-group input {
    width: 100%;
    background: #f0f2f5;
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 13px 14px;
    color: #111;
    font-size: 16px;
    outline: none;
    appearance: none;
    transition: border-color .2s, background .2s
  }

  .form-group input:focus {
    border-color: #25D366;
    background: #fff
  }

  .auth-btn {
    width: 100%;
    padding: 14px;
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    margin-top: 6px;
    cursor: pointer;
    appearance: none
  }

  .auth-btn:active {
    opacity: .88
  }

  .auth-links {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: #667781
  }

  .auth-links a {
    color: #075E54;
    font-weight: 600;
    text-decoration: none
  }

  .error-msg {
    background: #fff0f0;
    border: 1px solid #ffb3b3;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #c0392b;
    margin-bottom: 14px
  }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-circle"><i class="fa-brands fa-whatsapp"></i></div>
      <h1>ChatApp</h1>
      <p>Sign in to your account</p>
    </div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST" autocomplete="on">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      {% if invite_code %}<input type="hidden" name="invite_code" value="{{ invite_code }}">{% endif %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password"
          required>
      </div>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>
    <div class="auth-links">
      Don't have an account? <a href="/register/{% if invite_code %}?invite={{ invite_code }}{% endif %}">Register</a>
    </div>
  </div>
</div>
{% endblock %}
