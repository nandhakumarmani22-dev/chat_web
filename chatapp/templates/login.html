{% extends 'base.html' %}
{% block title %}Login — ChatApp{% endblock %}
{% block extra_css %}
<style>
.auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;

    background-image: url('https://bluespacetech.com/wp-content/uploads/2024/02/AI-chatbord.png');
    background-size: cover;        /* fills full screen */
    background-position: center;   /* center image */
    background-repeat: no-repeat;  /* no repeat */
}

  .auth-box {
    background: var(--sidebar-header);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--border);
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .auth-logo i {
    font-size: 48px;
    color: var(--green);
  }

  .auth-logo h1 {
    font-size: 24px;
    margin-top: 10px;
    color: var(--text);
  }

  .auth-logo p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }

  .form-group input:focus {
    border-color: var(--green);
  }

  .auth-btn {
    width: 100%;
    padding: 12px;
    background: var(--green);
    color: #fff;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    margin-top: 8px;
    transition: opacity .2s;
  }

  .auth-btn:hover {
    opacity: .88;
  }

  .auth-links {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--text2);
  }

  .auth-links a {
    color: var(--green);
  }

  .error-msg {
    background: rgba(241, 92, 109, 0.15);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
  }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">

      <h1>ChatApp</h1>
      <p>Sign in to your account</p>
    </div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      {% if invite_code %}<input type="hidden" name="invite_code" value="{{ invite_code }}">{% endif %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>
    <div class="auth-links">
      Don't have an account? <a href="/register/{% if invite_code %}?invite={{ invite_code }}{% endif %}">Register</a>
    </div>
  </div>
</div>
{% endblock %}
